game_profiles:
  - name: gw2
    exe_path: "C:/Program Files/Guild Wars 2/Gw2-64.exe"
    args:
      - "-shareArchive"
    working_dir: "C:/Program Files/Guild Wars 2"
    kill_mutex: "ANET-WIN32-MUTEX"

accounts:
  - { name: Jomie,      game_profile: gw2, extra_args: ["-l:id:1"] }
  - { name: Jaixi,      game_profile: gw2, extra_args: ["-l:id:2"] }
  - { name: AdminATVPN, game_profile: gw2, extra_args: ["-l:id:3"] }
  - { name: JomieAlt,   game_profile: gw2, extra_args: ["-l:id:1"] }

layout:
  name: innerspace-swap
  regions:
    - { name: swap-auto, x: 0, y: 0, width: 1920, height: 1080 }

team:
  name: gw2-four
  slots:
    - { index: 1, account: Jomie,      region: swap-auto }
    - { index: 2, account: Jaixi,      region: swap-auto }
    - { index: 3, account: AdminATVPN, region: swap-auto }
    - { index: 4, account: JomieAlt,   region: swap-auto }
  options:
    layout_mode: swap
    stagger_delay_ms: 3000
    window_timeout_ms: 60000
    hotkey_base: 0x75

broadcast:
  enabled: true
  delivery_mode: post_message
  toggle_key: 0x78
