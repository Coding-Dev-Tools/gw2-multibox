name: Bug report
description: Report a bug or unexpected behavior
title: '[Bug]: '
labels: ['bug']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: I ran `multisbox --config my.yaml` and...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected the window to be positioned at...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create config.yaml with...
        2. Run `multisbox --config config.yaml`
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config (redact any account names)
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste from `%APPDATA%\Multisbox\multisbox.log`
      render: text
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: multisbox version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
